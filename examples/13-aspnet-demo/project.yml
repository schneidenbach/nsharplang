name: EmployeeApi
version: 1.0.0
targetFramework: net9.0
sdk: Microsoft.NET.Sdk.Web
entry: Program.nl
outputType: exe

# All .nl files are automatically discovered (excluding .tests.nl files)
# To exclude additional files, use the exclude list:
# exclude:
#   - temp/**/*.nl
#   - old-code.nl

# Dependencies - runtime dependencies for the main project
dependencies:
  # Framework references
  - framework: Microsoft.AspNetCore.App

  # NuGet packages (with version)
  - nuget: Microsoft.EntityFrameworkCore.Sqlite
    version: 9.0.0
  - nuget: Microsoft.EntityFrameworkCore.Design
    version: 9.0.0
  - nuget: Swashbuckle.AspNetCore
    version: 7.2.0
  - nuget: Microsoft.AspNetCore.OpenApi
    version: 9.0.0

# Test dependencies - only used when running tests
testDependencies:
  - nuget: Microsoft.AspNetCore.Mvc.Testing
    version: 9.0.0
  - nuget: Microsoft.EntityFrameworkCore.InMemory
    version: 9.0.0
