name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Pack SDK to local feed
      run: |
        mkdir -p ~/.nuget/local-feed
        dotnet pack src/NSharpLang.Sdk/NSharpLang.Sdk.csproj -o ~/.nuget/local-feed --no-build -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Pack CLI
      run: dotnet pack src/NSharpLang.Cli/Cli.csproj -o artifacts/nuget --no-build -c Release

    - name: Install nlc
      run: dotnet tool install --global NSharpLang.Cli --no-cache --source artifacts/nuget

    - name: Lint
      run: dotnet src/NSharpLang.Cli/bin/Release/net10.0/Cli.dll lint
