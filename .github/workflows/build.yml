name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: Pack CLI
      run: dotnet pack src/NSharpLang.Cli/Cli.csproj -o artifacts/nuget --no-build

    - name: Install nlc
      run: dotnet tool install --global NSharpLang.Cli --no-cache --add-source artifacts/nuget

    - name: Lint
      run: nlc lint
      continue-on-error: true
